apiVersion: v1
kind: Service
metadata:
  name: konsen-headless
  namespace: konsen
  labels:
    app: konsen
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: konsen
  ports:
    - name: raft
      port: 10001
      targetPort: 10001
    - name: http
      port: 20001
      targetPort: 20001
---
apiVersion: v1
kind: Service
metadata:
  name: konsen
  namespace: konsen
  labels:
    app: konsen
spec:
  type: NodePort
  selector:
    app: konsen
  ports:
    - name: http
      port: 20001
      targetPort: 20001
      nodePort: 30001
